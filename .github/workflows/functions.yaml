name: functions workflow
on: workflow_dispatch
run-name: working 
jobs:
  myjob:
    runs-on: ubuntu-latest
    steps:
      - name: first_step
        id: sleep
        run: sleep 30
      - name: runs on calcelled
        if: ${{ cancelled() }}
        run: echo "runs on cancelled"
      - name: always
        if: ${{ always() }}
        run: echo "always launch"
      - name: success
        if: ${{ success() }}
        run: echo "success launch"
      - name: failure
        if: ${{ failure() && steps.sleep.conclusion }}
        run: echo "failure launch"
  second:
    runs-on: ubuntu-latest
    needs: myjob
    if: ${{ failure() }}
    steps:
      - run: echo "job was failed"